    url: https://nummeropslag.dk/api-noegle
tools:
  - tools/lookup_number.yaml
  - tools/check_spam.yaml
  - tools/get_operator.yaml
  - tools/search_businesses.yaml
  - tools/api_status.yaml
extra:
  python:
    source: provider/nummeropslag.py
