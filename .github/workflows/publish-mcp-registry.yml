name: Publish MCP Registry metadata

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-container:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish container
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/andrey-tut/nummeropslag-mcp:${{ github.event.release.tag_name }}
            ghcr.io/andrey-tut/nummeropslag-mcp:latest

  publish:
    needs: build-container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install MCP publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" |
            tar xz mcp-publisher

      - name: Authenticate with GitHub OIDC
        run: ./mcp-publisher login github-oidc

      - name: Publish server metadata
        run: ./mcp-publisher publish
